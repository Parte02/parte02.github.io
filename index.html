<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubham Parte — Data Analyst & AI Enthusiast</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#0A0F1E;color:#F0F4FF;font-family:'Inter',sans-serif;overflow-x:hidden;cursor:none}
.cur,.cur-r{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;transform:translate(-50%,-50%)}
.cur{width:10px;height:10px;background:#00D4B4;mix-blend-mode:difference;transition:transform .1s}
.cur-r{width:36px;height:36px;border:1.5px solid #00D4B4;z-index:9998;transition:all .12s;opacity:.6}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,180,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,180,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.glow1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,180,.07) 0%,transparent 70%);top:-150px;right:-100px;pointer-events:none;animation:pulse 7s ease-in-out infinite}
.glow2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.05) 0%,transparent 70%);bottom:50px;left:50px;pointer-events:none;animation:pulse 9s ease-in-out infinite 2s}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ticker-track{display:flex;animation:tick 32s linear infinite;white-space:nowrap;width:max-content}
input,textarea{background:rgba(255,255,255,.05)!important;border:1px solid rgba(255,255,255,.08)!important;border-radius:8px!important;padding:12px 14px!important;color:#F0F4FF!important;font-size:13px!important;font-family:'Inter',sans-serif!important;outline:none!important;width:100%!important;transition:border-color .2s!important;resize:none!important}
input:focus,textarea:focus{border-color:#00D4B4!important}
input::placeholder,textarea::placeholder{color:#8B92A9!important}

/* RESPONSIVE */
@media(max-width:1024px){
  .proj-grid{grid-template-columns:repeat(2,1fr)!important}
  .skills-grid{grid-template-columns:repeat(2,1fr)!important}
}
@media(max-width:768px){
  .hide-mob{display:none!important}
  .hero-h1{font-size:48px!important;letter-spacing:-2px!important}
  .hero-sec{padding:90px 20px 60px!important}
  .sec-wrap{padding:70px 20px!important}
  .about-grid{grid-template-columns:1fr!important;gap:32px!important}
  .skills-grid{grid-template-columns:1fr 1fr!important;gap:10px!important}
  .proj-grid{grid-template-columns:1fr!important}
  .ach-grid{grid-template-columns:1fr!important}
  .form-row{grid-template-columns:1fr!important}
  .hero-stats{gap:24px!important}
  .sec-title-main{font-size:36px!important}
  .nav-wrap{padding:14px 18px!important}
  footer{padding:16px 18px!important;flex-direction:column!important;gap:6px!important;text-align:center!important}
  .contact-btns{flex-direction:column!important;align-items:stretch!important}
  .contact-btns a{text-align:center!important;justify-content:center!important}
  .stat-n{font-size:26px!important}
  .hero-btns-wrap{flex-direction:column!important;gap:10px!important}
  .hero-btns-wrap a{text-align:center!important;justify-content:center!important}
  .mini-grid{grid-template-columns:1fr 1fr!important}
}
@media(max-width:480px){
  .hero-h1{font-size:36px!important}
  .skills-grid{grid-template-columns:1fr!important}
  .sec-title-main{font-size:30px!important}
  .mini-grid{grid-template-columns:1fr 1fr!important}
}
@media(min-width:1400px){
  .proj-grid{grid-template-columns:repeat(3,1fr)!important}
}
</style>
</head>
<body>
<div class="cur" id="cur"></div>
<div class="cur-r" id="curR"></div>
<div id="root"></div>

  card:'rgba(255,255,255,0.04)',border:'rgba(255,255,255,0.08)',

function scrollTo(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth'});}

function Nav({active}){
  const links=[['about','About'],['skills','Skills'],['experience','Experience'],['projects','Projects'],['certifications','Certs'],['contact','Contact']];
  return(
    <nav className="nav-wrap" style={{position:'fixed',top:0,left:0,right:0,zIndex:100,padding:'16px 48px',display:'flex',alignItems:'center',justifyContent:'space-between',backdropFilter:'blur(20px)',background:'rgba(10,15,30,0.9)',borderBottom:`1px solid ${T.border}`}}>
      <span style={{width:1}}></span>
      <ul className="hide-mob" style={{display:'flex',gap:28,listStyle:'none'}}>
        {links.map(([id,label])=>(
          <li key={id}><span onClick={()=>scrollTo(id)} style={{color:active===id?T.teal:T.muted,fontSize:13,fontWeight:500,cursor:'pointer',transition:'color .2s'}}>{label}</span></li>
        ))}
      </ul>
      <div style={{display:'flex',gap:10}}>
        <span onClick={()=>scrollTo('contact')} style={{background:T.teal,color:T.navy,padding:'7px 16px',borderRadius:4,fontSize:13,cursor:'pointer',fontFamily:'Inter',fontWeight:700}}>Hire Me</span>
      </div>
    </nav>
  );
}

function Hero(){
  const statsRef = useRef(null);
  useEffect(()=>{
    let done=false;
    const data=[['s1',15,'+'],[`s2`,8,'+'],[`s3`,5,'+'],[`s4`,200,'+']];
    const run=()=>{if(done)return;done=true;data.forEach(([id,target,sfx])=>{let n=0;const step=target/70;const t=setInterval(()=>{n=Math.min(n+step,target);const el=document.getElementById(id);if(el)el.textContent=Math.floor(n)+sfx;if(n>=target)clearInterval(t);},18);});};
    const obs=new IntersectionObserver(e=>{if(e[0].isIntersecting)run();},{threshold:.3});
    if(statsRef.current)obs.observe(statsRef.current);
    return()=>obs.disconnect();
  },[]);
  return(
    <section id="home" className="hero-sec" style={{minHeight:'100vh',display:'flex',alignItems:'center',padding:'120px 48px 80px',position:'relative',overflow:'hidden'}}>
      <div className="hero-grid"/><div className="glow1"/><div className="glow2"/>
      <div style={{position:'relative',zIndex:1,maxWidth:860,width:'100%'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(0,212,180,0.1)',border:'1px solid rgba(0,212,180,0.25)',padding:'7px 16px',borderRadius:20,fontFamily:'Space Mono',fontSize:11,color:T.teal,marginBottom:28}}>
          <span style={{width:6,height:6,background:T.teal,borderRadius:'50%',animation:'blink 1.5s infinite',display:'inline-block'}}/>
          Open to opportunities · Mumbai & Remote
        </div>
        <h1 className="hero-h1" style={{fontFamily:'Syne',fontSize:82,fontWeight:800,lineHeight:.96,letterSpacing:-3,marginBottom:24}}>
          Shubham<br/><span style={{color:T.teal}}>Parte.</span>
        </h1>
        <p style={{fontSize:17,color:T.muted,lineHeight:1.85,maxWidth:580,marginBottom:40,fontWeight:300}}>
          <strong style={{color:T.white,fontWeight:500}}>Data Analyst & AI Enthusiast</strong> — I transform raw data into business decisions that cut costs, automate workflows, and move strategy forward. Power BI · SQL · Python · Supply Chain.
        </p>
        <div className="hero-btns-wrap" style={{display:'flex',gap:14,flexWrap:'wrap',marginBottom:60}}>
          <a href="https://github.com/Parte02" target="_blank"
            style={{background:T.teal,color:T.navy,padding:'14px 30px',borderRadius:4,fontWeight:700,fontSize:14,textDecoration:'none',display:'inline-block'}}>

        <div style={{fontFamily:'Space Mono',fontSize:11,color:T.teal,letterSpacing:2,textTransform:'uppercase',marginBottom:12}}>Get In Touch</div>
        <div className="sec-title-main" style={{fontFamily:'Syne',fontSize:44,fontWeight:800,letterSpacing:-2,lineHeight:1.05,marginBottom:14}}>Let's build<br/>something together.</div>
        <p style={{fontSize:16,color:T.muted,marginBottom:40,lineHeight:1.8}}>
          Open to <b style={{color:T.white}}>Data Analyst</b>, <b style={{color:T.white}}>MIS Analyst</b>, <b style={{color:T.white}}>Power BI Developer</b>, and <b style={{color:T.white}}>Business Analyst</b> roles in Mumbai or Remote. Available immediately.
        </p>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:32,marginBottom:28,textAlign:'left'}}>
          <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <label style={{fontSize:12,color:T.muted,fontFamily:'Space Mono'}}>Your Name</label>
              <input placeholder="John Smith" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <label style={{fontSize:12,color:T.muted,fontFamily:'Space Mono'}}>Your Email</label>
              <input type="email" placeholder="john@company.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
            <label style={{fontSize:12,color:T.muted,fontFamily:'Space Mono'}}>Subject</label>
            <input placeholder="Data Analyst Opportunity at XYZ" value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
            <label style={{fontSize:12,color:T.muted,fontFamily:'Space Mono'}}>Message</label>
            <textarea rows={5} placeholder="Hi Shubham, I came across your portfolio and wanted to discuss..." value={form.message} onChange={e=>setForm({...form,message:e.target.value})}/>
          </div>
          <button onClick={send} style={{width:'100%',background:T.teal,color:T.navy,border:'none',padding:14,borderRadius:8,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Inter',transition:'all .2s'}}>
            Send Message →
          </button>
          {st&&<div style={{marginTop:10,fontSize:13,textAlign:'center',color:sc}}>{st}</div>}
        </div>
        <div className="contact-btns" style={{display:'flex',justifyContent:'center',gap:14,flexWrap:'wrap'}}>
          <a href="https://linkedin.com/in/shubham-parte-a60219231" target="_blank"
            style={{display:'inline-flex',alignItems:'center',gap:8,padding:'12px 22px',borderRadius:6,fontSize:13,fontWeight:500,textDecoration:'none',border:'1px solid rgba(0,119,181,0.4)',color:'#0077B5',background:'rgba(0,119,181,0.08)'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(0,119,181,0.18)'}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(0,119,181,0.08)'}}>
            <LI/> Connect on LinkedIn
          </a>
          <a href="https://github.com/Parte02" target="_blank"
            style={{display:'inline-flex',alignItems:'center',gap:8,padding:'12px 22px',borderRadius:6,fontSize:13,textDecoration:'none',border:`1px solid ${T.border}`,color:T.white,background:'rgba(255,255,255,0.05)'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=T.white}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border}}>
            <GH/> View GitHub
          </a>
          <a href="mailto:parte.shubham0205@gmail.com"
            style={{display:'inline-flex',alignItems:'center',gap:8,padding:'12px 22px',borderRadius:6,fontSize:13,textDecoration:'none',border:`1px solid ${T.border}`,color:T.white,background:'rgba(255,255,255,0.05)'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=T.teal;e.currentTarget.style.color=T.teal}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.white}}>
            ✉ Send Email
          </a>
        </div>
      </div>
    </section>
  );
}



function App(){
  const [active,setActive]=useState('home');
  useEffect(()=>{
    // cursor
    const cur=document.getElementById('cur'),curR=document.getElementById('curR');
    const mv=e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';setTimeout(()=>{curR.style.left=e.clientX+'px';curR.style.top=e.clientY+'px';},60);};
    document.addEventListener('mousemove',mv);
    document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,span[style*="cursor"]')){cur.style.transform='translate(-50%,-50%) scale(2)';curR.style.transform='translate(-50%,-50%) scale(1.5)';}});
    document.addEventListener('mouseout',e=>{if(e.target.closest('a,button,span[style*="cursor"]')){cur.style.transform='translate(-50%,-50%) scale(1)';curR.style.transform='translate(-50%,-50%) scale(1)';}});
    // active nav
    const onScroll=()=>{
      const ids=['home','about','skills','experience','projects','certifications','contact'];
      let cur='home';ids.forEach(id=>{const el=document.getElementById(id);if(el&&window.scrollY>=el.offsetTop-140)cur=id;});
      setActive(cur);
    };
    window.addEventListener('scroll',onScroll,{passive:true});

    return()=>{document.removeEventListener('mousemove',mv);window.removeEventListener('scroll',onScroll);};
  },[]);
  return(
    <>
      <Nav active={active}/>
      <Hero/>
      <Ticker/>
      <About/>
      <Skills/>
      <Experience/>
      <Projects/>
      <Certifications/>
      <Achievements/>
      <Contact/>
      <footer style={{padding:'22px 48px',borderTop:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div style={{fontFamily:'Syne',fontWeight:800,fontSize:16,color:T.teal}}>Shubham Parte.</div>
        <div style={{fontSize:11,color:T.muted,fontFamily:'Space Mono'}}>© 2026 · Data Analyst · Mumbai, India · Built with ❤️</div>
      </footer>

    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
